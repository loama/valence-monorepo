name: Capgo

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/capgo.yml
  workflow_dispatch:

concurrency:
  group: capgo-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy production live update
    runs-on: ubuntu-latest
    env:
      CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
      CAPGO_PRIVATE_KEY: ${{ secrets.CAPGO_PRIVATE_KEY }}
      NEXT_PUBLIC_VALENCE_API_URL: ${{ secrets.NEXT_PUBLIC_VALENCE_API_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install app dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build mobile web bundle
        working-directory: app
        run: bun run build:mobile

      - name: Verify Capgo token
        run: |
          if [ -z "$CAPGO_TOKEN" ]; then
            echo "::error::CAPGO_TOKEN is required to upload production live updates."
            exit 1
          fi
          if [ -z "$CAPGO_PRIVATE_KEY" ]; then
            echo "::error::CAPGO_PRIVATE_KEY is required to upload encrypted production live updates."
            exit 1
          fi

      - name: Upload production bundle to Capgo
        working-directory: app
        run: |
          release_number="$(
            bun -e '
              const fs = require("node:fs");
              const release = JSON.parse(fs.readFileSync("release-version.json", "utf8"));
              const version = Number(release.version);
              if (!Number.isInteger(version) || version < 1) {
                console.error("release-version.json must contain a positive integer version.");
                process.exit(1);
              }
              console.log(version);
            '
          )"
          if [ -z "$release_number" ]; then
            echo "::error::Unable to read app release version."
            exit 1
          fi
          bundle_version="1.1.${release_number}"
          bunx @capgo/cli@latest bundle upload com.valencedev.platform \
            --apikey "$CAPGO_TOKEN" \
            --path out \
            --channel production \
            --bundle "$bundle_version" \
            --comment "$GITHUB_SHA" \
            --key-data-v2 "$CAPGO_PRIVATE_KEY"
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SECRET_KEY" ]; then
            curl --fail --silent --show-error \
              "$SUPABASE_URL/rest/v1/app_versions" \
              -H "apikey: $SUPABASE_SECRET_KEY" \
              -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates" \
              --data "$(
                printf '{"platform":"ios","release_number":%s,"bundle_version":"%s","capgo_channel":"production","status":"released","notes":"%s"}' \
                  "$release_number" "$bundle_version" "$GITHUB_SHA"
              )"
          else
            echo "::warning::SUPABASE_URL and SUPABASE_SECRET_KEY are required for realtime app_versions announcements."
          fi
