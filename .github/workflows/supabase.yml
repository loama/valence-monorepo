name: Supabase

on:
  push:
    branches:
      - development
      - main
    paths:
      - database/**
      - .github/workflows/supabase.yml
  workflow_dispatch:

concurrency:
  group: supabase-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate database workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install database dependencies
        working-directory: database
        run: bun install --frozen-lockfile

      - name: Check Drizzle migrations
        working-directory: database
        run: bun run db:check

      - name: Typecheck database workspace
        working-directory: database
        run: bun run build

  migrate-production:
    name: migrate production
    needs: validate
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_PRODUCTION_DB_URL }}
      SUPABASE_PROJECT_REF: iqkwqjgvtzknyoldnrzj

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install database dependencies
        working-directory: database
        run: bun install --frozen-lockfile

      - name: Verify production secrets
        id: production-secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning::Skipping production migrations because SUPABASE_ACCESS_TOKEN or SUPABASE_PRODUCTION_DB_URL is missing."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push production database migrations
        if: steps.production-secrets.outputs.ready == 'true'
        run: bun --cwd database supabase db push --db-url "$SUPABASE_DB_URL" --yes

  migrate-development:
    name: migrate development
    needs: validate
    if: github.ref_name == 'development'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DEVELOPMENT_DB_URL }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_DEVELOPMENT_PROJECT_REF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install database dependencies
        working-directory: database
        run: bun install --frozen-lockfile

      - name: Verify development secrets
        id: development-secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_URL" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::warning::Skipping development migrations because SUPABASE_ACCESS_TOKEN, SUPABASE_DEVELOPMENT_DB_URL, or SUPABASE_DEVELOPMENT_PROJECT_REF is missing."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push development database migrations
        if: steps.development-secrets.outputs.ready == 'true'
        run: bun --cwd database supabase db push --db-url "$SUPABASE_DB_URL" --yes
